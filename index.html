<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS MONITOR • Validator Konten Asli</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #020617;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    color: #e2e8f0;
    padding: 24px 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* header premium */
.header {
    text-align: center;
    margin-bottom: 32px;
}

.header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
}

.badge-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 16px 0 8px;
}

.badge {
    background: #0f172a;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 0.75rem;
    border: 1px solid #1e293b;
    font-family: monospace;
}

.live-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.stat-box {
    background: #0f172a;
    border-radius: 28px;
    padding: 8px 20px;
    backdrop-filter: blur(4px);
    border: 1px solid #334155;
}

.stat-box span:first-child {
    color: #94a3b8;
    font-size: 0.8rem;
}

.stat-box span:last-child {
    font-weight: 700;
    font-size: 1.1rem;
    margin-left: 8px;
}

/* grid cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    margin-top: 10px;
}

.card {
    background: #0f172ad9;
    backdrop-filter: blur(2px);
    border-radius: 24px;
    border: 1px solid #1e293b;
    transition: all 0.2s;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
    border-color: #3b82f6;
    transform: translateY(-2px);
    background: #111827f2;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px 8px 18px;
    border-bottom: 1px solid #1e2a3a;
}

.card-name {
    font-weight: 800;
    font-size: 1.2rem;
    background: linear-gradient(135deg, #f0f9ff, #bae6fd);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.status {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 50px;
}

.status.valid {
    background: #064e3b;
    color: #6ee7b7;
    box-shadow: 0 0 8px #10b98140;
}

.status.invalid {
    background: #7f1a1a;
    color: #fecaca;
}

.status.checking {
    background: #1e293b;
    color: #94a3b8;
}

.url-section {
    padding: 12px 18px;
    background: #090c15;
    margin: 8px 12px;
    border-radius: 16px;
    font-size: 0.7rem;
    word-break: break-all;
}

.url-section a {
    color: #60a5fa;
    text-decoration: none;
}

.url-section a:hover {
    text-decoration: underline;
}

.content-preview {
    background: #030712;
    margin: 8px 12px 12px 12px;
    border-radius: 16px;
    padding: 12px;
    font-family: 'Fira Code', monospace;
    font-size: 0.7rem;
    border-left: 3px solid #2563eb;
    max-height: 130px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #cbd5e1;
}

.footer-meta {
    display: flex;
    justify-content: space-between;
    padding: 10px 18px 14px 18px;
    font-size: 0.65rem;
    color: #5b6e8c;
    border-top: 1px solid #1e293b;
    margin-top: 6px;
}

.fetch-timestamp {
    font-family: monospace;
}

.badge-http {
    background: #0f172a;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: monospace;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}

.loading {
    animation: pulse 1.2s infinite;
}

.refresh-btn {
    background: #1e293b;
    border: none;
    color: white;
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.7rem;
    transition: 0.2s;
}

.refresh-btn:hover {
    background: #2d3a4f;
}

.creator-note {
    text-align: center;
    font-size: 0.7rem;
    margin-top: 36px;
    color: #475569;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔍 UPLOAD MONITOR • RAW ASLI</h1>
        <div class="badge-row">
            <div class="badge">⚡ FETCH KONTEN LANGSUNG (via proxy CORS)</div>
            <div class="badge">📌 VALIDASI: mengandung "CREATED AT"</div>
        </div>
        <div class="live-stats">
            <div class="stat-box">🕒 <span id="liveTime">--:--:--</span></div>
            <div class="stat-box">⏱️ UPTIME <span id="uptimeDisplay">0d</span></div>
            <div class="stat-box">✅ VALID <span id="validTotal">0</span></div>
            <div class="stat-box">❌ EXPIRED <span id="invalidTotal">0</span></div>
            <div class="stat-box">📦 TOTAL <span id="totalCount">0</span></div>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <button class="refresh-btn" id="manualRefreshBtn">⟳ FORCE CHECK SEMUA</button>
        </div>
    </div>

    <div id="cardsGrid" class="grid"></div>
    <div class="creator-note">⚠️ Semua paste di-fetch isi RAW asli (via allorigins.win CORS proxy) → deteksi teks "CREATED AT" → status valid jika ada & response 200</div>
</div>

<script>
// ======================= DAFTAR SUMBER (raw URL asli) =======================
const RAW_SOURCES = [
    { name: "NEKOID.CC", url: "https://pb.nekoid.cc/uCbr", raw: "https://pb.nekoid.cc/uCbr" },
    { name: "PASTE.EE (VIEW)", url: "https://paste.ee/p/jDq3THqM", raw: "https://paste.ee/r/jDq3THqM" },
    { name: "PASTE.EE (RAW)", url: "https://paste.ee/r/jDq3THqM", raw: "https://paste.ee/r/jDq3THqM" },
    { name: "RUBIS APP (VIEW)", url: "https://rubis.app/view/?scrap=TdrQo24Kat2JpHz2", raw: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw" },
    { name: "RUBIS RAW API", url: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw", raw: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw" },
    { name: "PASTEFY", url: "https://pastefy.app/8uNFL4QZ/raw", raw: "https://pastefy.app/8uNFL4QZ/raw" },
    { name: "PASTE.RS", url: "https://paste.rs/gInQ0", raw: "https://paste.rs/gInQ0" },
    { name: "PASTEBIN", url: "https://pastebin.com/raw/inZGNrT4", raw: "https://pastebin.com/raw/inZGNrT4" },
    { name: "MYST.PASTE", url: "https://paste.myst.rs/raw/xg15v6li/xf6jevi4", raw: "https://paste.myst.rs/raw/xg15v6li/xf6jevi4" },
    { name: "BASEDBIN", url: "https://basedbin.fly.dev/sTIYAV", raw: "https://basedbin.fly.dev/sTIYAV" },
    { name: "DPASTE.COM", url: "https://dpaste.com/CYSYJERKM.txt", raw: "https://dpaste.com/CYSYJERKM.txt" },
    { name: "PASTE-BIN.XYZ", url: "https://paste-bin.xyz/raw/NRE5c667", raw: "https://paste-bin.xyz/raw/NRE5c667" },
    { name: "HST.SH", url: "https://hst.sh/raw/iqahiluzev", raw: "https://hst.sh/raw/iqahiluzev" },
    { name: "HASTE.ZNEIX", url: "https://haste.zneix.eu/raw/opytesucux", raw: "https://haste.zneix.eu/raw/opytesucux" },
    { name: "SOURCEB.IN", url: "https://cdn.sourceb.in/bins/hw37mRWTu1/0", raw: "https://cdn.sourceb.in/bins/hw37mRWTu1/0" },
    { name: "P.IP.FI", url: "https://p.ip.fi/2JWL.txt", raw: "https://p.ip.fi/2JWL.txt" }
];

// GLOBAL STATE
let statusStore = new Map(); // key = name, value = { status, httpCode, contentSnippet, fullContentCheck, errorMsg, lastFetch }

const START_DATE = new Date("2026-06-06T17:30:46+07:00");

// PROXY UNTUK BYPASS CORS & AMBIL KONTEN ASLI (menggunakan allorigins, gratis dan reliable)
// kita akan fetch raw via proxy agar bisa baca response body dengan bebas
async function fetchRealContent(rawUrl) {
    // Gunakan CORS proxy: allorigins (mengambil full response)
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}`;
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const response = await fetch(proxyUrl, {
            signal: controller.signal,
            headers: { "Cache-Control": "no-cache, no-store" }
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
            return { ok: false, status: response.status, content: null, error: `HTTP ${response.status}` };
        }
        
        const text = await response.text();
        return { ok: true, status: response.status, content: text, error: null };
    } catch (err) {
        let errMsg = err.name === 'AbortError' ? "Timeout 15s" : err.message;
        return { ok: false, status: 0, content: null, error: errMsg };
    }
}

// validasi berdasarkan "CREATED AT" (case sensitive? banyak yang pakai uppercase, tapi kita cek string "CREATED AT" di dalam konten)
function validateContentContainsCreatedAt(content) {
    if (!content || typeof content !== 'string') return false;
    // normalisasi: cek apakah mengandung "CREATED AT" (bisa uppercase / lowercase, tapi lebih tepat cek asli)
    return content.toUpperCase().includes("CREATED AT");
}

// melakukan pengecekan ke semua link
async function checkAllSites(forceFresh = true) {
    // set semua status ke checking dulu
    for (let site of RAW_SOURCES) {
        const existing = statusStore.get(site.name);
        statusStore.set(site.name, {
            status: "checking",
            httpCode: null,
            contentSnippet: null,
            errorMsg: "memeriksa konten...",
            lastFetch: null,
            hasCreatedAt: false
        });
    }
    renderCards(); // render animasi checking
    
    // konfigurasi batch dengan concurrency 5 agar tidak overload proxy
    const concurrency = 5;
    for (let i = 0; i < RAW_SOURCES.length; i += concurrency) {
        const batch = RAW_SOURCES.slice(i, i + concurrency);
        const promises = batch.map(async (site) => {
            const result = await fetchRealContent(site.raw);
            let isValid = false;
            let snippet = null;
            let hasCreatedAtFlag = false;
            
            if (result.ok && result.content) {
                const content = result.content;
                hasCreatedAtFlag = validateContentContainsCreatedAt(content);
                isValid = hasCreatedAtFlag;
                // buat snippet preview (150 karakter pertama)
                snippet = content.length > 180 ? content.substring(0, 180).replace(/\n/g, '↵ ') + "…" : content.replace(/\n/g, '↵ ');
                // tambahkan indikasi ditemukan "CREATED AT"
                if (hasCreatedAtFlag) {
                    snippet = `✅ ${snippet}`;
                } else {
                    snippet = `❌ (tidak ada "CREATED AT") — ${snippet}`;
                }
            } else {
                snippet = `Gagal fetch: ${result.error || "tidak ada respon"}`;
            }
            
            const finalStatus = isValid ? "valid" : "invalid";
            statusStore.set(site.name, {
                status: finalStatus,
                httpCode: result.ok ? result.status : (result.status || 0),
                contentSnippet: snippet,
                errorMsg: !result.ok ? result.error : (isValid ? null : "Konten tidak mengandung 'CREATED AT'"),
                lastFetch: new Date(),
                hasCreatedAt: hasCreatedAtFlag,
                fullLength: result.content ? result.content.length : 0
            });
        });
        await Promise.all(promises);
        renderCards(); // render per batch agar user lihat progres
        await new Promise(r => setTimeout(r, 80));
    }
    renderCards();
}

// Render Dashboard dengan bukti konten asli
function renderCards() {
    // Update header stats
    const now = new Date();
    document.getElementById("liveTime").innerHTML = now.toLocaleTimeString('id-ID', { hour12: false });
    const diffSec = (now - START_DATE) / 1000;
    const days = Math.floor(diffSec / 86400);
    const hours = Math.floor((diffSec % 86400) / 3600);
    const mins = Math.floor((diffSec % 3600) / 60);
    document.getElementById("uptimeDisplay").innerHTML = `${days}d ${hours}h ${mins}m`;
    
    let validCount = 0, invalidCount = 0;
    for (let site of RAW_SOURCES) {
        const state = statusStore.get(site.name);
        if (state?.status === "valid") validCount++;
        else if (state?.status === "invalid") invalidCount++;
    }
    document.getElementById("validTotal").innerText = validCount;
    document.getElementById("invalidTotal").innerText = invalidCount;
    document.getElementById("totalCount").innerText = RAW_SOURCES.length;
    
    // Buat grid kartu
    let html = '';
    for (let site of RAW_SOURCES) {
        const state = statusStore.get(site.name) || { status: "checking", httpCode: null, contentSnippet: null, errorMsg: "menunggu...", lastFetch: null, hasCreatedAt: false };
        const isChecking = state.status === "checking";
        const isValid = state.status === "valid";
        
        let statusClass = "checking";
        let statusText = "🔄 FETCHING...";
        let statusBadgeExtra = "";
        
        if (!isChecking) {
            if (isValid) {
                statusClass = "valid";
                statusText = "✅ VALID (CREATED AT DETECTED)";
            } else {
                statusClass = "invalid";
                statusText = "❌ INVALID / TIDAK ADA CREATED AT";
            }
        }
        
        const httpDisplay = state.httpCode ? `HTTP ${state.httpCode}` : (state.errorMsg ? "Gagal" : "-");
        const snippetRaw = state.contentSnippet || (isChecking ? "⏳ Mengambil konten asli dari server..." : "Tidak ada preview");
        const lastFetchStr = state.lastFetch ? state.lastFetch.toLocaleTimeString() : "-";
        
        // buktikan bahwa ini konten ASLI dengan menampilkan potongan, dan jika valid, highlight bahwa ada CREATED AT
        let createdAtEvidence = "";
        if (!isChecking && isValid && state.hasCreatedAt) {
            createdAtEvidence = `<span style="background:#065f46; padding:2px 8px; border-radius:40px; font-size:10px;">🔖 Ditemukan 'CREATED AT' di dalam konten</span>`;
        } else if (!isChecking && !isValid && state.errorMsg && !state.hasCreatedAt && state.httpCode === 200) {
            createdAtEvidence = `<span style="background:#7f1a1a; padding:2px 8px; border-radius:40px; font-size:10px;">⚠️ Respon 200 tapi tidak mengandung 'CREATED AT'</span>`;
        } else if (!isChecking && !isValid && state.httpCode && state.httpCode !== 200) {
            createdAtEvidence = `<span style="background:#450a0a; padding:2px 8px; border-radius:40px; font-size:10px;">⚠️ HTTP ${state.httpCode} — tidak bisa baca konten</span>`;
        }
        
        html += `
        <div class="card">
            <div class="card-header">
                <div class="card-name">📄 ${escapeHtml(site.name)}</div>
                <div class="status ${statusClass}">${statusText}</div>
            </div>
            <div class="url-section">
                <div>🔗 <a href="${escapeHtml(site.url)}" target="_blank">${truncate(site.url, 65)}</a></div>
                <div style="font-size:0.65rem; margin-top:4px;">📡 raw: <a href="${escapeHtml(site.raw)}" target="_blank">${truncate(site.raw, 60)}</a></div>
            </div>
            <div class="content-preview">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span style="font-weight:bold; font-size:0.7rem;">📋 ISI KONTEN ASLI (RAW) :</span>
                    <span class="badge-http">${httpDisplay}</span>
                </div>
                <div style="font-size:0.7rem; font-family: monospace; white-space: pre-wrap; word-break: break-word;">${escapeHtml(snippetRaw)}</div>
                ${createdAtEvidence ? `<div style="margin-top: 8px;">${createdAtEvidence}</div>` : ''}
            </div>
            <div class="footer-meta">
                <span class="fetch-timestamp">🕘 last fetch: ${lastFetchStr}</span>
                <span>${!isChecking && state.fullLength ? `📦 ${state.fullLength} chars` : ''}</span>
            </div>
        </div>`;
    }
    document.getElementById("cardsGrid").innerHTML = html;
}

function truncate(str, len) {
    if (!str) return "";
    if (str.length <= len) return str;
    return str.slice(0, len-3) + "...";
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Fungsi auto update waktu tiap detik (hanya update jam dan stat tanpa re-render penuh supaya tidak mengganggu)
function updateLiveClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('id-ID', { hour12: false });
    const timeElem = document.getElementById("liveTime");
    if (timeElem) timeElem.innerHTML = timeStr;
    const diffSec = (now - START_DATE) / 1000;
    const days = Math.floor(diffSec / 86400);
    const hours = Math.floor((diffSec % 86400) / 3600);
    const mins = Math.floor((diffSec % 3600) / 60);
    const uptimeElem = document.getElementById("uptimeDisplay");
    if (uptimeElem) uptimeElem.innerHTML = `${days}d ${hours}h ${mins}m`;
    
    // update stat counts secara realtime dari statusStore
    let v=0, inv=0;
    for(let s of RAW_SOURCES) {
        const st = statusStore.get(s.name);
        if(st?.status === "valid") v++;
        else if(st?.status === "invalid") inv++;
    }
    const validSpan = document.getElementById("validTotal");
    const invalidSpan = document.getElementById("invalidTotal");
    if(validSpan) validSpan.innerText = v;
    if(invalidSpan) invalidSpan.innerText = inv;
    if(document.getElementById("totalCount")) document.getElementById("totalCount").innerText = RAW_SOURCES.length;
}

// memulai pengecekan pertama kali
(async function init() {
    await checkAllSites();
    // refresh otomatis setiap 35 detik (ambil ulang konten asli)
    setInterval(async () => {
        await checkAllSites();
    }, 35000);
    // update jam tiap detik
    setInterval(() => {
        updateLiveClock();
    }, 1000);
    
    const manualBtn = document.getElementById("manualRefreshBtn");
    if(manualBtn) {
        manualBtn.addEventListener("click", async () => {
            manualBtn.innerText = "⟳ MENGECEK...";
            manualBtn.disabled = true;
            await checkAllSites();
            manualBtn.innerText = "⟳ FORCE CHECK SEMUA";
            manualBtn.disabled = false;
        });
    }
})();
</script>
</body>
</html>
