<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Monitor • Paste Health Dashboard</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at 10% 20%, #0a0c15, #03050b);
    color: #eef2ff;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    padding: 2rem 1.5rem;
    min-height: 100vh;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* header modern */
.header {
    text-align: center;
    margin-bottom: 3rem;
    position: relative;
}

.header h1 {
    font-size: 2.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.glow-badge {
    display: inline-block;
    background: rgba(96, 165, 250, 0.15);
    backdrop-filter: blur(4px);
    border-radius: 80px;
    padding: 0.3rem 1rem;
    font-size: 0.85rem;
    border: 1px solid rgba(96,165,250,0.3);
    margin-top: 10px;
    font-family: monospace;
}

.live-badge {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
}

.live-card {
    background: #0f121fcc;
    backdrop-filter: blur(12px);
    border-radius: 2rem;
    padding: 0.6rem 1.5rem;
    border: 1px solid #2d3748;
    font-weight: 500;
    font-size: 0.9rem;
}

.live-card span:first-child {
    color: #9ca3af;
}

/* stats bar */
.stats-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
}

.stat-pill {
    background: #11161f;
    border-radius: 2rem;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    border-left: 3px solid;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.stat-pill.valid { border-left-color: #22c55e; }
.stat-pill.invalid { border-left-color: #ef4444; }
.stat-pill.total { border-left-color: #3b82f6; }

/* grid cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1.25rem;
}

.card {
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(4px);
    border-radius: 1.5rem;
    border: 1px solid #252e3f;
    transition: all 0.2s ease;
    padding: 1.2rem 1.3rem;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
}

.card:hover {
    transform: translateY(-2px);
    border-color: #3b4b6e;
    background: #111827cc;
    box-shadow: 0 20px 30px -10px black;
}

.card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
}

.card-name {
    font-weight: 700;
    font-size: 1.25rem;
    background: linear-gradient(135deg, #e2e8f0, #bfd9ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.2px;
}

.status-chip {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.7rem;
    border-radius: 50px;
    background: #1e293b;
    text-transform: uppercase;
}

.status-chip.valid {
    background: #14532d;
    color: #86efac;
    box-shadow: 0 0 6px #22c55e40;
}

.status-chip.invalid {
    background: #7f1a1a;
    color: #fca5a5;
}

.status-chip.checking {
    background: #334155;
    color: #cbd5e1;
}

.url-text {
    font-size: 0.75rem;
    font-family: 'Fira Code', monospace;
    background: #0a0e16;
    padding: 0.5rem 0.7rem;
    border-radius: 1rem;
    margin: 12px 0;
    word-break: break-all;
    border: 1px solid #28303f;
}

.url-text a {
    color: #7aa2f7;
    text-decoration: none;
}

.url-text a:hover {
    text-decoration: underline;
    color: #a0c4ff;
}

.info-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    margin-top: 0.7rem;
    color: #9ca3af;
    align-items: center;
}

.timestamp {
    font-family: monospace;
    font-size: 0.7rem;
}

.response-badge {
    font-family: monospace;
    font-weight: bold;
}

.raw-snippet {
    font-size: 0.7rem;
    background: #03060c;
    border-radius: 12px;
    padding: 0.4rem 0.6rem;
    margin-top: 0.6rem;
    color: #b9c7d9;
    border-left: 2px solid #2e3a4b;
    white-space: nowrap;
    overflow-x: auto;
}

footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.7rem;
    color: #4b5563;
}

@keyframes pulse {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
}

.loading-dots::after {
    content: '...';
    animation: blink 1.2s infinite;
}

@keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📡 UPLOAD MONITOR</h1>
        <div class="glow-badge">🔍 VALIDATION · RAW CONTENT CHECK (CREATED AT)</div>
        <div class="live-badge">
            <div class="live-card"><span>🕒 SYSTEM TIME</span> <span id="timeLive">—</span></div>
            <div class="live-card"><span⏱️ UPTIME</span> <span id="uptime">—</span></div>
        </div>
    </div>

    <div class="stats-row" id="statsPanel">
        <div class="stat-pill total">📦 TOTAL: <span id="totalCount">0</span></div>
        <div class="stat-pill valid">✅ VALID (CREATED AT): <span id="validCount">0</span></div>
        <div class="stat-pill invalid">❌ INVALID / DEAD: <span id="deadCount">0</span></div>
    </div>

    <div id="list" class="grid"></div>
    <footer>⚡ realtime check | setiap paste di-fetch isi RAW nya → mencari teks "CREATED AT" + HTTP 200 → status valid</footer>
</div>

<script>
// === CONFIGURATION ===
const START_TIME = new Date("2026-06-06T17:30:46+07:00");

const LINKS = [
    { name: "NEKOID.CC", url: "https://pb.nekoid.cc/uCbr", rawUrl: "https://pb.nekoid.cc/uCbr" },
    { name: "PASTE.EE VIEW", url: "https://paste.ee/p/jDq3THqM", rawUrl: "https://paste.ee/r/jDq3THqM" },
    { name: "PASTE.EE RAW", url: "https://paste.ee/r/jDq3THqM", rawUrl: "https://paste.ee/r/jDq3THqM" },
    { name: "RUBIS VIEW", url: "https://rubis.app/view/?scrap=TdrQo24Kat2JpHz2", rawUrl: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw" },
    { name: "RUBIS RAW", url: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw", rawUrl: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw" },
    { name: "PASTEFY", url: "https://pastefy.app/8uNFL4QZ/raw", rawUrl: "https://pastefy.app/8uNFL4QZ/raw" },
    { name: "PASTE.RS", url: "https://paste.rs/gInQ0", rawUrl: "https://paste.rs/gInQ0" },
    { name: "PASTEBIN", url: "https://pastebin.com/raw/inZGNrT4", rawUrl: "https://pastebin.com/raw/inZGNrT4" },
    { name: "MYST", url: "https://paste.myst.rs/raw/xg15v6li/xf6jevi4", rawUrl: "https://paste.myst.rs/raw/xg15v6li/xf6jevi4" },
    { name: "BASEDBIN", url: "https://basedbin.fly.dev/sTIYAV", rawUrl: "https://basedbin.fly.dev/sTIYAV" },
    { name: "DPASTE", url: "https://dpaste.com/CYSYJERKM.txt", rawUrl: "https://dpaste.com/CYSYJERKM.txt" },
    { name: "PASTE-BIN.XYZ", url: "https://paste-bin.xyz/raw/NRE5c667", rawUrl: "https://paste-bin.xyz/raw/NRE5c667" },
    { name: "HST.SH", url: "https://hst.sh/raw/iqahiluzev", rawUrl: "https://hst.sh/raw/iqahiluzev" },
    { name: "HASTE.ZNEIX", url: "https://haste.zneix.eu/raw/opytesucux", rawUrl: "https://haste.zneix.eu/raw/opytesucux" },
    { name: "SOURCEB.IN", url: "https://cdn.sourceb.in/bins/hw37mRWTu1/0", rawUrl: "https://cdn.sourceb.in/bins/hw37mRWTu1/0" },
    { name: "P.IP.FI", url: "https://p.ip.fi/2JWL.txt", rawUrl: "https://p.ip.fi/2JWL.txt" }
];

// state store for live status & raw snippet preview
let statusMap = new Map(); // key = name, value = { status: 'checking'|'valid'|'invalid', httpStatus?: number, snippet?: string, errorMsg?: string }

// helper: format uptime (detik, menit, jam, hari, bulan, tahun)
function formatDetailedUptime(seconds) {
    if (seconds < 0) seconds = 0;
    const sec = seconds % 60;
    const minutes = Math.floor(seconds / 60) % 60;
    const hours = Math.floor(seconds / 3600) % 24;
    const days = Math.floor(seconds / 86400) % 30;
    const months = Math.floor(seconds / 2592000) % 12;
    const years = Math.floor(seconds / 31536000);
    
    let parts = [];
    if (years > 0) parts.push(`${years} thn`);
    if (months > 0) parts.push(`${months} bln`);
    if (days > 0) parts.push(`${days} hr`);
    if (hours > 0) parts.push(`${hours} jam`);
    if (minutes > 0) parts.push(`${minutes} mnt`);
    if (sec > 0 || parts.length === 0) parts.push(`${Math.floor(sec)} dtk`);
    
    return parts.join(' · ');
}

// core validation: fetch raw content and check "CREATED AT" substring (case-insensitive but we match exact phrase)
async function validatePaste(rawUrl) {
    try {
        // menggunakan fetch dengan timeout manual via AbortController (bawaan 15 detik)
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000); // 12s timeout
        
        const response = await fetch(rawUrl, {
            method: "GET",
            signal: controller.signal,
            headers: {
                "Accept": "text/plain, */*",
                "Cache-Control": "no-cache"
            }
        });
        clearTimeout(timeoutId);
        
        let httpStatus = response.status;
        let okStatus = response.ok; // status in 200-299
        
        if (!okStatus) {
            return { valid: false, httpStatus: httpStatus, snippet: null, error: `HTTP ${httpStatus}` };
        }
        
        // baca teks mentah
        const text = await response.text();
        const trimmedText = text.trim();
        // cek apakah mengandung "CREATED AT" (case insensitive? di requirement: "CREATED AT", kita lebih presisi: mencari string "CREATED AT" (biasanya uppercase)
        // tapi karena content mungkin "CREATED AT" atau "Created At", kita pakai regex insensitive, tapi sesuai permintaan "CREATED AT"
        // tapi lebih aman: cek menggunakan toUpperCase() atau indexOf insensitive.
        const hasCreatedAt = trimmedText.toUpperCase().includes("CREATED AT");
        
        let snippet = "";
        if (trimmedText.length > 0) {
            snippet = trimmedText.length > 120 ? trimmedText.substring(0, 120).replace(/\n/g, '↵ ') + "…" : trimmedText.replace(/\n/g, '↵ ');
        } else {
            snippet = "(empty content)";
        }
        
        if (hasCreatedAt && okStatus) {
            return { valid: true, httpStatus: httpStatus, snippet: snippet, error: null };
        } else {
            let reason = !hasCreatedAt ? "missing 'CREATED AT'" : "status error";
            return { valid: false, httpStatus: httpStatus, snippet: snippet, error: reason };
        }
    } catch (err) {
        let errorMsg = err.name === 'AbortError' ? "Timeout (12s)" : err.message;
        return { valid: false, httpStatus: 0, snippet: null, error: `Fetch fail: ${errorMsg}` };
    }
}

// update all cards with latest status map
async function refreshAllStatuses() {
    // set semua status ke checking dulu
    for (let link of LINKS) {
        let existing = statusMap.get(link.name);
        if (!existing || existing.status !== "checking") {
            statusMap.set(link.name, { status: "checking", httpStatus: null, snippet: null, errorMsg: "checking..." });
        }
    }
    renderDashboard(); // render immediate "checking..."
    
    // melakukan parallel fetch dengan concurrency terbatas (6) agar tidak overload
    const concurrency = 6;
    const results = [];
    for (let i = 0; i < LINKS.length; i += concurrency) {
        const batch = LINKS.slice(i, i + concurrency);
        const batchPromises = batch.map(async (link) => {
            const rawCheckUrl = link.rawUrl;
            const result = await validatePaste(rawCheckUrl);
            return { name: link.name, result };
        });
        const batchResults = await Promise.all(batchPromises);
        results.push(...batchResults);
    }
    
    // update statusMap berdasarkan hasil
    for (let item of results) {
        const prev = statusMap.get(item.name) || {};
        if (item.result.valid) {
            statusMap.set(item.name, {
                status: "valid",
                httpStatus: item.result.httpStatus,
                snippet: item.result.snippet,
                errorMsg: null
            });
        } else {
            statusMap.set(item.name, {
                status: "invalid",
                httpStatus: item.result.httpStatus,
                snippet: item.result.snippet,
                errorMsg: item.result.error || (item.result.httpStatus ? `HTTP ${item.result.httpStatus}` : "failed"),
            });
        }
    }
    renderDashboard();
}

// render stats + grid
function renderDashboard() {
    // update waktu dan uptime
    const now = new Date();
    const elapsedSec = (now - START_TIME) / 1000;
    document.getElementById("timeLive").innerHTML = now.toLocaleString("id-ID", { hour12: false });
    document.getElementById("uptime").innerHTML = formatDetailedUptime(elapsedSec);
    
    // hitung statistik
    let total = LINKS.length;
    let validCount = 0, invalidCount = 0;
    for (let link of LINKS) {
        const state = statusMap.get(link.name);
        if (state) {
            if (state.status === "valid") validCount++;
            else if (state.status === "invalid") invalidCount++;
        } else {
            invalidCount++;
        }
    }
    // menyesuaikan jika ada belum terdata -> dianggap checking (tapi nggak dihitung invalid)
    let checkingCount = total - (validCount + invalidCount);
    // untuk stat invalid yang tertunda checking kita tetap hitung sbg waiting? tapi pill menunjukkan valid vs invalid (checking belum final)
    document.getElementById("totalCount").innerText = total;
    document.getElementById("validCount").innerText = validCount;
    document.getElementById("deadCount").innerText = invalidCount;
    
    let gridHtml = "";
    for (let link of LINKS) {
        const state = statusMap.get(link.name) || { status: "checking", httpStatus: null, snippet: null, errorMsg: "initializing..." };
        const isValid = state.status === "valid";
        const isChecking = state.status === "checking";
        
        let statusChipClass = "checking";
        let statusText = "CHECKING";
        let responseExtra = "";
        let snippetPreview = "";
        
        if (isChecking) {
            statusChipClass = "checking";
            statusText = "⏳ SCANNING";
            responseExtra = "fetching raw...";
        } else if (isValid) {
            statusChipClass = "valid";
            statusText = "✅ VALID";
            let http = state.httpStatus ? `${state.httpStatus}` : "200";
            responseExtra = `HTTP ${http} · contains "CREATED AT"`;
            if (state.snippet) {
                snippetPreview = `📄 preview: ${escapeHtml(state.snippet)}`;
            }
        } else {
            statusChipClass = "invalid";
            statusText = "❌ INVALID";
            let errorDetail = state.errorMsg || (state.httpStatus ? `HTTP ${state.httpStatus}` : "dead/error");
            if (state.httpStatus === 0 && !state.errorMsg) errorDetail = "unreachable";
            if (state.snippet && !isValid && !isChecking) {
                responseExtra = `fail · ${errorDetail} · no "CREATED AT"`;
                snippetPreview = `📄 (last content) ${escapeHtml(state.snippet)}`;
            } else {
                responseExtra = `fail · ${errorDetail}`;
                if (state.snippet) snippetPreview = `📄 raw: ${escapeHtml(state.snippet)}`;
                else snippetPreview = `⚠️ empty response or timeout`;
            }
        }
        
        // tampilkan status code jika ada
        let statusCodeHtml = "";
        if (!isChecking && state.httpStatus && state.httpStatus !== 0) {
            statusCodeHtml = `<span class="response-badge" style="background:#1e293b; padding:2px 6px; border-radius:30px;">${state.httpStatus}</span>`;
        } else if (!isChecking && state.errorMsg) {
            statusCodeHtml = `<span class="response-badge" style="background:#2d1a1a;">⚠️ ${state.errorMsg.substring(0, 35)}</span>`;
        }
        
        // menentukan link raw (mengarah ke rawUrl)
        const rawTarget = link.rawUrl;
        
        gridHtml += `
        <div class="card">
            <div class="card-header">
                <span class="card-name">📌 ${escapeHtml(link.name)}</span>
                <span class="status-chip ${statusChipClass}">${statusText}</span>
            </div>
            <div class="url-text">
                🔗 <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener">${truncateUrl(link.url, 55)}</a>
                ${rawTarget !== link.url ? `<br>📡 raw: <a href="${escapeHtml(rawTarget)}" target="_blank">raw ⇢</a>` : ''}
            </div>
            <div class="info-row">
                <span>${responseExtra}</span>
                ${statusCodeHtml}
            </div>
            ${snippetPreview ? `<div class="raw-snippet">${snippetPreview}</div>` : (isChecking ? `<div class="raw-snippet" style="color:#a0aec0;">⏳ connecting to server & checking 'CREATED AT' ...</div>` : '')}
            <div class="timestamp">
                🕘 last check: ${new Date().toLocaleTimeString()}
            </div>
        </div>
        `;
    }
    document.getElementById("list").innerHTML = gridHtml;
}

function truncateUrl(url, maxLen) {
    if (url.length <= maxLen) return url;
    return url.slice(0, maxLen-3) + "...";
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

// auto refresh setiap 30 detik (fresh validation)
let autoRefreshInterval = null;
let rerenderClock = null;

function startMonitoring() {
    // pertama langsung fetch
    refreshAllStatuses();
    // kemudian atur interval background update (setiap 30 detik agar uptodate)
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
        refreshAllStatuses();
    }, 30000); // 30 detik
    
    // waktu realtime update per detik untuk jam dan uptime
    if (rerenderClock) clearInterval(rerenderClock);
    rerenderClock = setInterval(() => {
        // hanya update timestamp dan uptime serta stat tanpa re-fetch data (biar UI ga ngeblink berat)
        const now = new Date();
        const elapsedSec = (now - START_TIME) / 1000;
        document.getElementById("timeLive").innerHTML = now.toLocaleString("id-ID", { hour12: false });
        document.getElementById("uptime").innerHTML = formatDetailedUptime(elapsedSec);
        // update stat counts (dari statusMap)
        let validCt = 0, invalidCt = 0;
        for (let link of LINKS) {
            const st = statusMap.get(link.name);
            if (st?.status === "valid") validCt++;
            else if (st?.status === "invalid") invalidCt++;
        }
        document.getElementById("validCount").innerText = validCt;
        document.getElementById("deadCount").innerText = invalidCt;
        document.getElementById("totalCount").innerText = LINKS.length;
        // optional: bisa juga re-render kartu jika diperlukan, tapi hanya update time stamp kecil? tidak, biar tidak flicker.
        // untuk update timestamp per card kita bisa re-render tipis? tidak, tapi kita update waktu di setiap card dengan cara re-render tanpa mengganggu status yang sama?
        // lebih baik jangan re-render full card setiap detik karena akan mengganggu hover. cukup perbarui elemen timestamp di setiap card secara efisien? terlalu kompleks.
        // tapi karena fungsi renderDashboard menggambar ulang semua card, itu berat jika tiap detik, jadi sebaiknya renderDashboard hanya dipanggil saat hasil fetch baru atau setelah fetch.
        // Jadi untuk jam & uptime tiap detik tidak perlu render ulang card, hanya header yang diperbarui.
        // namun kita perlu memastikan user melihat status yg sama, jadi kita hanya update text di header.
        // juga jika ada pengecekan ulang tiap 30 detik, akan panggil renderDashboard. jadi cukup. memisahkan timer untuk jam saja.
    }, 1000);
}

// panggil inisialisasi
startMonitoring();
</script>
</body>
</html>
