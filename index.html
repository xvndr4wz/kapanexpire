<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Upload Monitor Fixed</title>
<style>
body{background:#0b0f19;color:#fff;font-family:Arial}
.card{padding:12px;margin:10px;background:#111827;border-radius:10px}
.ok{color:#22c55e}
.bad{color:#ef4444}
.warn{color:#f59e0b}
a{color:#60a5fa}
</style>
</head>
<body>

<h2>UPLOAD CHECKER</h2>
<div id="list"></div>

<script>
const links = [
{n:"PASTE.EE RAW", url:"https://paste.ee/r/jDq3THqM"},
{n:"PASTEBIN RAW", url:"https://pastebin.com/raw/inZGNrT4"},
{n:"PASTEFY RAW", url:"https://pastefy.app/8uNFL4QZ/raw"}
];

async function check(url){
    try{
        let res = await fetch(url);
        let text = await res.text();

        if(text.includes("CREATED AT")){
            return {status:"VALID", content:text};
        } else {
            return {status:"INVALID", content:text};
        }

    } catch(e){
        return {status:"ERROR"};
    }
}

async function render(){
    let html = "";

    for(let l of links){
        let r = await check(l.url);

        let color = r.status==="VALID"?"ok":r.status==="INVALID"?"warn":"bad";

        html += `
        <div class="card">
            <b>${l.n}</b><br>
            <a href="${l.url}" target="_blank">${l.url}</a><br>
            <span class="${color}">STATUS: ${r.status}</span>
        </div>`;
    }

    document.getElementById("list").innerHTML = html;
}

render();
setInterval(render,15000);
</script>

</body>
</html>
