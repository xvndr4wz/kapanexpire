<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse · Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #191c25;
  --border: #1f2333;
  --border-soft: #1a1e2a;
  --accent-green: #00d68f;
  --accent-red: #ff4d6a;
  --accent-blue: #4d9fff;
  --accent-yellow: #f5c542;
  --text-primary: #e8ecf5;
  --text-secondary: #5c6480;
  --text-muted: #3a3f54;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 40px 28px 80px;
}

/* subtle dot grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #1f2333 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 40px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-dot {
  width: 10px;
  height: 10px;
  background: var(--accent-green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent-green);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-green); }
  50% { opacity: 0.5; box-shadow: 0 0 16px var(--accent-green); }
}

.brand-title {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.brand-sub {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.refresh-btn {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.refresh-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(77, 159, 255, 0.05);
}

.refresh-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STAT STRIP ── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 2px;
  margin-bottom: 24px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.stat-cell {
  background: var(--surface);
  padding: 18px 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.stat-num {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
}

.stat-num.blue  { color: var(--accent-blue); }
.stat-num.green { color: var(--accent-green); }
.stat-num.red   { color: var(--accent-red); }

/* ── UPTIME BAR ── */
.uptime-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.uptime-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}

.uptime-val {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-secondary);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 5px;
  letter-spacing: 0.03em;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.card:hover {
  border-color: var(--border-soft);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.card.is-valid  { border-left: 2px solid var(--accent-green); }
.card.is-invalid { border-left: 2px solid var(--accent-red); }
.card.is-checking { border-left: 2px solid var(--text-muted); }

/* card top */
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border-soft);
}

.card-name {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-primary);
}

.pill {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}

.pill.valid    { background: rgba(0,214,143,0.1);  color: var(--accent-green); }
.pill.invalid  { background: rgba(255,77,106,0.1); color: var(--accent-red); }
.pill.checking { background: rgba(92,100,128,0.15); color: var(--text-secondary); }

/* url row */
.card-url {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-soft);
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-url a {
  color: var(--accent-blue);
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.15s;
}

.card-url a:hover { opacity: 1; }

/* preview */
.card-preview {
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 0.62rem;
  line-height: 1.55;
  color: var(--text-secondary);
  min-height: 72px;
  max-height: 120px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.card-preview::-webkit-scrollbar { width: 3px; }
.card-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* shimmer skeleton */
.shimmer {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  height: 56px;
  border-radius: 6px;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* card footer */
.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  border-top: 1px solid var(--border-soft);
  gap: 8px;
  flex-wrap: wrap;
}

.card-foot-left {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.foot-time {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--text-muted);
}

.badge-created {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  background: rgba(0,214,143,0.08);
  color: var(--accent-green);
  padding: 2px 8px;
  border-radius: 3px;
  margin-top: 2px;
}

.badge-warn {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  background: rgba(245,197,66,0.08);
  color: var(--accent-yellow);
  padding: 2px 8px;
  border-radius: 3px;
  margin-top: 2px;
}

.badge-lost {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  background: rgba(255,77,106,0.08);
  color: var(--accent-red);
  padding: 2px 8px;
  border-radius: 3px;
  margin-top: 2px;
}

.badge-never {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.58rem;
  background: rgba(92,100,128,0.1);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 3px;
  margin-top: 2px;
}

.http-tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}

/* footer */
.page-footer {
  text-align: center;
  margin-top: 56px;
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-title">Pulse Monitor</div>
        <div class="brand-sub">RAW only · deteksi "CREATED AT"</div>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn">
      <span id="refreshIcon">↻</span> cek sekarang
    </button>
  </div>

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-cell">
      <span class="stat-label">total link</span>
      <span class="stat-num blue" id="totalCount">0</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">valid (created at)</span>
      <span class="stat-num green" id="validCount">0</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">expired / hilang</span>
      <span class="stat-num red" id="invalidCount">0</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">last checked</span>
      <span class="stat-num" style="font-size:0.8rem; color:var(--text-secondary); font-family:var(--mono);" id="lastCheckTime">--</span>
    </div>
  </div>

  <!-- UPTIME -->
  <div class="uptime-bar">
    <span class="uptime-label">↑ sejak 6 Juni 2026 · 17:30:46 WIB</span>
    <span class="uptime-val" id="uptimeVal">--</span>
  </div>

  <!-- CARDS -->
  <div class="grid" id="cardsGrid"></div>

  <div class="page-footer">pulse · raw paste monitor · multi-proxy fallback</div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const PASTE_LIST = [
  { name: "NEKOID.CC",      rawUrl: "https://pb.nekoid.cc/uCbr" },
  { name: "PASTE.EE",       rawUrl: "https://paste.ee/r/jDq3THqM" },
  { name: "RUBIS",          rawUrl: "https://api.rubis.app/v2/scrap/TdrQo24Kat2JpHz2/raw" },
  { name: "PASTEFY",        rawUrl: "https://pastefy.app/8uNFL4QZ/raw" },
  { name: "PASTE.RS",       rawUrl: "https://paste.rs/gInQ0" },
  { name: "PASTEBIN",       rawUrl: "https://pastebin.com/raw/inZGNrT4" },
  { name: "MYST",           rawUrl: "https://paste.myst.rs/raw/xg15v6li/xf6jevi4" },
  { name: "BASEDBIN",       rawUrl: "https://basedbin.fly.dev/sTIYAV" },
  { name: "DPASTE",         rawUrl: "https://dpaste.com/CYSYJERKM.txt" },
  { name: "PASTE-BIN.XYZ",  rawUrl: "https://paste-bin.xyz/raw/NRE5c667" },
  { name: "HST.SH",         rawUrl: "https://hst.sh/raw/iqahiluzev" },
  { name: "HASTE.ZNEIX",    rawUrl: "https://haste.zneix.eu/raw/opytesucux" },
  { name: "SOURCEB.IN",     rawUrl: "https://cdn.sourceb.in/bins/hw37mRWTu1/0" },
  { name: "P.IP.FI",        rawUrl: "https://p.ip.fi/2JWL.txt" }
];

const START_DATE = new Date("2026-06-06T17:30:46+07:00");
const TIMEOUT_MS = 14000;

// ─── PROXY STRATEGIES ──────────────────────────────────────
// Multiple proxy strategies with fallback chain
// Some proxies work better with certain domains
function buildProxyChain(rawUrl) {
  const enc = encodeURIComponent(rawUrl);
  return [
    // 1. corsproxy.io — general purpose
    {
      url: `https://corsproxy.io/?${enc}`,
      headers: { "x-requested-with": "XMLHttpRequest" }
    },
    // 2. allorigins — returns JSON wrapper, extract .contents
    {
      url: `https://api.allorigins.win/raw?url=${enc}`,
      headers: {}
    },
    // 3. thingproxy — good for sites blocking corsproxy
    {
      url: `https://thingproxy.freeboard.io/fetch/${rawUrl}`,
      headers: {}
    },
    // 4. corsproxy.io with no extra headers (clean fallback)
    {
      url: `https://corsproxy.io/?url=${enc}`,
      headers: { "Cache-Control": "no-cache" }
    }
  ];
}

async function tryFetch(proxyUrl, extraHeaders = {}) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
  try {
    const res = await fetch(proxyUrl, {
      signal: ctrl.signal,
      headers: {
        "Cache-Control": "no-cache, no-store",
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        ...extraHeaders
      }
    });
    clearTimeout(tid);
    if (!res.ok) return { ok: false, status: res.status, content: null };
    const text = await res.text();
    return { ok: true, status: res.status, content: text };
  } catch (e) {
    clearTimeout(tid);
    return { ok: false, status: 0, content: null, error: e.name === 'AbortError' ? 'Timeout' : e.message };
  }
}

async function fetchWithFallback(rawUrl) {
  const chain = buildProxyChain(rawUrl);
  let lastErr = null;

  for (let i = 0; i < chain.length; i++) {
    const { url, headers } = chain[i];
    const res = await tryFetch(url, headers);

    if (res.ok && res.content !== null) {
      return { ...res, proxyIdx: i };
    }

    // 403 / 404 means content gone — no point retrying different proxy
    // unless it's the first attempt (proxy itself might be blocked)
    if (res.status === 404) {
      return { ok: false, status: 404, content: null, error: 'HTTP 404 Not Found' };
    }

    lastErr = res;
    // Small delay between proxy attempts
    if (i < chain.length - 1) await new Promise(r => setTimeout(r, 300));
  }

  return {
    ok: false,
    status: lastErr?.status || 0,
    content: null,
    error: lastErr?.error || `HTTP ${lastErr?.status}`
  };
}

// ─── STATE ─────────────────────────────────────────────────
const store = new Map();
for (const p of PASTE_LIST) {
  store.set(p.name, {
    status: 'checking',
    httpCode: null,
    snippet: null,
    hasCreatedAt: false,
    firstSeen: new Date(),
    lastValid: null,
    errorMsg: null,
    lastCheck: null
  });
}

function hasCreatedAt(content) {
  return content ? content.toUpperCase().includes("CREATED AT") : false;
}

function makeSnippet(content, hasCA) {
  if (!content) return '(kosong / tidak bisa fetch)';
  const s = content.length > 200
    ? content.slice(0, 200).replace(/\n/g, ' ↵ ') + '…'
    : content.replace(/\n/g, ' ↵ ');
  return hasCA ? `✓ "CREATED AT" terdeteksi\n${s}` : `✗ tidak ada "CREATED AT"\n${s}`;
}

// ─── CHECK ─────────────────────────────────────────────────
async function checkAll() {
  for (const p of PASTE_LIST) {
    const old = store.get(p.name);
    store.set(p.name, { ...old, status: 'checking', snippet: null, errorMsg: null });
  }
  render();

  const tasks = PASTE_LIST.map(async (paste) => {
    const result = await fetchWithFallback(paste.rawUrl);
    const now = new Date();
    const hasCA = result.ok && result.content ? hasCreatedAt(result.content) : false;
    const isValid = hasCA && result.ok;

    const old = store.get(paste.name);
    const lastValid = isValid ? now : (old?.lastValid || null);

    store.set(paste.name, {
      status: isValid ? 'valid' : 'invalid',
      httpCode: result.status || 0,
      snippet: result.ok && result.content
        ? makeSnippet(result.content, hasCA)
        : `✗ gagal: ${result.error || `HTTP ${result.status}`}`,
      hasCreatedAt: hasCA,
      errorMsg: !isValid
        ? (result.error || (!hasCA && result.ok ? 'tidak ada "CREATED AT"' : `HTTP ${result.status}`))
        : null,
      lastValid,
      firstSeen: old?.firstSeen || now,
      lastCheck: now
    });

    render(); // live update per card
  });

  await Promise.all(tasks);
  document.getElementById('lastCheckTime').textContent = new Date().toLocaleTimeString('id-ID');
}

// ─── RENDER ────────────────────────────────────────────────
function render() {
  let valid = 0, invalid = 0;
  for (const p of PASTE_LIST) {
    const s = store.get(p.name);
    if (s?.status === 'valid') valid++;
    else if (s?.status === 'invalid') invalid++;
  }
  document.getElementById('totalCount').textContent = PASTE_LIST.length;
  document.getElementById('validCount').textContent = valid;
  document.getElementById('invalidCount').textContent = invalid;

  let html = '';
  for (const paste of PASTE_LIST) {
    const d = store.get(paste.name);
    if (!d) continue;

    const isValid    = d.status === 'valid';
    const isChecking = d.status === 'checking';

    const cardClass = isChecking ? 'is-checking' : isValid ? 'is-valid' : 'is-invalid';
    const pillClass = isChecking ? 'checking'    : isValid ? 'valid'    : 'invalid';
    const pillText  = isChecking ? '● checking…' : isValid ? '✓ valid'  : '✗ expired';

    // Preview content
    let previewHtml;
    if (isChecking) {
      previewHtml = `<div class="shimmer"></div>`;
    } else {
      previewHtml = escH(d.snippet || '');
    }

    // Footer badge
    let badgeHtml = '';
    if (!isChecking) {
      if (isValid) {
        badgeHtml = `<span class="badge-created">✓ created at found</span>`;
      } else if (d.httpCode === 200 && !d.hasCreatedAt) {
        badgeHtml = `<span class="badge-warn">⚠ 200 OK · no created at</span>`;
      } else if (d.lastValid) {
        badgeHtml = `<span class="badge-lost">hilang sejak ${relTime(d.lastValid)}</span>`;
      } else {
        badgeHtml = `<span class="badge-never">belum pernah valid</span>`;
      }
    }

    const httpLabel = d.httpCode ? `HTTP ${d.httpCode}` : (isChecking ? '…' : 'ERR');
    const checkTime = d.lastCheck ? fmtTime(d.lastCheck) : '--';

    html += `
    <div class="card ${cardClass}">
      <div class="card-top">
        <span class="card-name">${escH(paste.name)}</span>
        <span class="pill ${pillClass}">${pillText}</span>
      </div>
      <div class="card-url">
        <a href="${escH(paste.rawUrl)}" target="_blank" rel="noopener">${trunc(paste.rawUrl, 72)}</a>
      </div>
      <div class="card-preview">${isChecking ? previewHtml : escH(d.snippet || '')}</div>
      <div class="card-foot">
        <div class="card-foot-left">
          <span class="foot-time">dicek: ${checkTime}</span>
          ${badgeHtml}
        </div>
        <span class="http-tag">${httpLabel}</span>
      </div>
    </div>`;
  }

  document.getElementById('cardsGrid').innerHTML = html;
}

// ─── UPTIME ────────────────────────────────────────────────
function updateUptime() {
  const sec = Math.max(0, (Date.now() - START_DATE) / 1000);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  let out = '';
  if (d > 0) out += `${d}d `;
  out += `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  document.getElementById('uptimeVal').textContent = out;
}

setInterval(updateUptime, 1000);
updateUptime();

// ─── HELPERS ───────────────────────────────────────────────
function fmtTime(d) {
  return d.toLocaleString('id-ID', {
    day:'2-digit', month:'short',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
}

function relTime(d) {
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)   return `${diff}d lalu`;
  if (diff < 3600) return `${Math.floor(diff/60)}m lalu`;
  if (diff < 86400) return `${Math.floor(diff/3600)}j ${Math.floor((diff%3600)/60)}m lalu`;
  return `${Math.floor(diff/86400)}h lalu`;
}

function trunc(s, n) {
  return s && s.length > n ? s.slice(0, n - 1) + '…' : (s || '');
}

function escH(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ─── REFRESH BUTTON ────────────────────────────────────────
const btn = document.getElementById('refreshBtn');
const ico = document.getElementById('refreshIcon');

btn.addEventListener('click', async () => {
  btn.disabled = true;
  ico.classList.add('spin');
  await checkAll();
  ico.classList.remove('spin');
  btn.disabled = false;
});

// ─── INIT ──────────────────────────────────────────────────
render();
checkAll();
</script>
</body>
</html>
